database:
  path: stocks_2y.db
  backup_before_update: true
  max_backups: 5
strategy:
  benchmark: sh.000300
  liquidity:
    min_20d_amount: 5000
    min_120d_amount: 3000
  annual_trend:
    rolling_days: 250
    rolling_price_up: 0.15
    rolling_vol_up: 0.3
    ma_slope_threshold: 0
  monthly_retest:
    down_tolerance: 0.12
    near_tolerance: 0.08
    window: 18
    min_gap: 3
    min_touches: 1
  weekly_retest:
    down_tolerance: 0.12
    near_tolerance: 0.08
    window: 60
    min_gap: 5
    min_touches: 2
  bollinger:
    period: 20
    std_mult: 2
    short_ma: 5
    long_ma: 20
    short_dir_period: 2
    mid_dir_period: 3
    monthly_require_mid_up: false
    weekly_require_mid_up: true
    weekly_pre_expand: true
    weekly_contraction_ratio: 0.9
    weekly_dual_mode: true
  financial_filter:
    enabled: true
    consec_quarters: 2
    min_profit_yoy: 0.0
    min_pni_yoy: 0.0
    min_net_profit: 10000000
    profit_acceleration: true
  # v4.5 归因驱动权重（基于 signal_attribution.csv 历史累积收益）
  # 缩写：mr=月回踩 mb=月布林 wr=周回踩 wb=周布林
  signal_ranking:
    all_resonance: 20         # Tier1 主力 758次/+1218%
    mr_mb: 12                 # 最稳定弹性 283次/+197%
    mb_wr: 10                 # 最高单笔收益 3.67%均收
    mr_mb_wr: 8               # 三信号共振
    mb_wr_wb: 6               # 56%胜率 32次/+88%
    mr_mb_wr_wb: 4            # 四信号但归因样本极少
    mr_wr: 3                  # 边际+30%
    wr_wb: 2                  # 边际+40%
    mr_wr_wb: 0               # 禁用：-125%累积亏损
    mr_mb_wb: 0               # 禁用：3次样本太少
    mr_wb: 0                  # 禁用：3次样本太少
backtest:
  init_cash: 1000000
  max_stocks: 200
  lookback_years: 2
  rebalance_freq: W              # 周频调仓（v4.5从月频改为周频）
  commission: 0.0001
  slippage: 0.001
  stamp_duty: 0.001
  stop_loss_enabled: true
  stop_loss_pct: -10.0            # 止损线
cache:
  enabled: true
  file: .signal_cache.pkl
